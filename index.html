<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Something Special 🎁</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  color: white;
  overflow: hidden;
}

/* sections */
#lockScreen, #mainContent {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  padding: 20px;
}

h1 {
  font-size: 2.5em;
}

#countdown {
  font-size: 1.8em;
  margin-top: 20px;
}

/* typing text */
#typedText {
  font-size: 1.3em;
  margin-top: 15px;
  max-width: 90%;
}

/* image */
img {
  width: 80%;
  max-width: 280px;
  border-radius: 20px;
  margin-top: 20px;
}

/* button */
button {
  padding: 12px 22px;
  font-size: 16px;
  margin-top: 20px;
  border: none;
  border-radius: 20px;
  background: white;
  color: #ff5e78;
  cursor: pointer;
}

/* fireworks canvas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <h1>⏳ Wait for it...</h1>
  <p>This surprise unlocks at midnight 💖</p>
  <div id="countdown"></div>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent">
  <h1>🎉 Happy Birthday ❤️</h1>

  <div id="typedText"></div>

  <img src="Screenshot.png" alt="Her Image">

  <button onclick="playMusic()">Play Song 🎵</button>

  <audio id="music" src="The_Weight_of_Half_a_Room.mp3"></audio>
</div>

<script>
// 🎯 SET DATE (IST SAFE)
const targetDate = new Date("2026-04-10T14:20:00+05:30");

const lockScreen = document.getElementById("lockScreen");
const mainContent = document.getElementById("mainContent");
const countdown = document.getElementById("countdown");

// COUNTDOWN FUNCTION
function updateCountdown() {
  const now = new Date();
  const diff = targetDate - now;

  if (diff <= 0) {
    lockScreen.style.display = "none";
    mainContent.style.display = "flex";
    startTyping();
    return;
  }

  lockScreen.style.display = "flex";

  const hours = Math.floor(diff / (1000 * 60 * 60));
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  countdown.innerHTML = `${hours}h ${minutes}m ${seconds}s`;
}

setInterval(updateCountdown, 1000);

// 💖 TYPING EFFECT
const message = "You are the most special person in my life ❤️ I hope this day brings you endless happiness 😊";
let i = 0;

function startTyping() {
  if (i < message.length) {
    document.getElementById("typedText").innerHTML += message.charAt(i);
    i++;
    setTimeout(startTyping, 40);
  }
}

// 🎵 MUSIC
function playMusic() {
  document.getElementById("music").play();
}

// 🎆 FIREWORKS
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createFirework() {
  const x = Math.random() * canvas.width;
  const y = Math.random() * canvas.height / 2;

  for (let i = 0; i < 40; i++) {
    particles.push({
      x: x,
      y: y,
      dx: (Math.random() - 0.5) * 5,
      dy: (Math.random() - 0.5) * 5,
      life: 80
    });
  }
}

function updateFireworks() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach((p, index) => {
    p.x += p.dx;
    p.y += p.dy;
    p.life--;

    ctx.fillStyle = "white";
    ctx.fillRect(p.x, p.y, 2, 2);

    if (p.life <= 0) particles.splice(index, 1);
  });

  requestAnimationFrame(updateFireworks);
}

setInterval(createFirework, 800);
updateFireworks();
</script>

</body>
</html>
