<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Something Special 🎁</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: white;
    }

    #lockScreen, #mainContent {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    h1 {
      font-size: 3em;
    }

    #countdown {
      font-size: 2em;
      margin-top: 20px;
    }

    img {
      width: 250px;
      border-radius: 20px;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      background: white;
      color: #ff5e78;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="lockScreen">
  <h1>⏳ Wait for it...</h1>
  <p>This surprise unlocks at midnight 💖</p>
  <div id="countdown"></div>
</div>

<div id="mainContent">
  <h1>🎉 Happy Birthday ❤️</h1>
  <p>
    You are the most special person in my life.<br>
    I hope this day brings you endless happiness 😊
  </p>

  <img src="your-image.jpg" alt="Her Image">

  <button onclick="playMusic()">Play Song 🎵</button>

  <audio id="music" src="your-song.mp3"></audio>
</div>

<script>
  // 🎯 SET HER BIRTHDAY DATE (IMPORTANT)
  const targetDate = new Date("2026-04-15T00:00:00"); // CHANGE DATE

  const lockScreen = document.getElementById("lockScreen");
  const mainContent = document.getElementById("mainContent");
  const countdown = document.getElementById("countdown");

  function updateCountdown() {
    const now = new Date();
    const diff = targetDate - now;

    if (diff <= 0) {
      lockScreen.style.display = "none";
      mainContent.style.display = "flex";
      return;
    }

    lockScreen.style.display = "flex";

    const hours = Math.floor(diff / (1000 * 60 * 60));
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    countdown.innerHTML = `${hours}h ${minutes}m ${seconds}s`;
  }

  setInterval(updateCountdown, 1000);

  function playMusic() {
    document.getElementById("music").play();
  }
</script>

</body>
</html>
