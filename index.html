<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

/* container card */
.container {
  width: 90%;
  max-width: 400px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 25px 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* hidden sections */
.hidden {
  display: none;
}

h1 {
  font-size: 1.8em;
  margin-bottom: 10px;
}

p {
  font-size: 1em;
  line-height: 1.5;
}

/* countdown */
#countdown {
  font-size: 1.5em;
  margin-top: 15px;
  font-weight: bold;
}

/* typing */
#typedText {
  margin-top: 15px;
  font-size: 1.1em;
  min-height: 60px;
}

/* image */
img {
  width: 100%;
  max-width: 250px;
  border-radius: 15px;
  margin-top: 15px;
}

/* button */
button {
  margin-top: 20px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 12px;
  background: white;
  color: #ff4d6d;
  font-size: 16px;
  font-weight: bold;
}

/* small animation */
.fade {
  animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">

  <!-- LOCK SCREEN -->
  <div id="lockScreen">
    <h1>⏳ Wait for it...</h1>
    <p>This surprise unlocks soon 💖</p>
    <div id="countdown"></div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="mainContent" class="hidden">
    <h1 class="fade">🎉 Happy Birthday ❤️</h1>

    <div id="typedText"></div>

    <img src="Screenshot.png" class="fade">

    <button onclick="playMusic()">Play Song 🎵</button>

    <audio id="music" src="The_Weight_of_Half_a_Room.mp3"></audio>
  </div>

</div>

<script>
// 🎯 SET DATE (IST SAFE)
const targetDate = new Date("2026-04-10T14:20:00+05:30");

const lockScreen = document.getElementById("lockScreen");
const mainContent = document.getElementById("mainContent");
const countdown = document.getElementById("countdown");

// COUNTDOWN
function updateCountdown() {
  const now = new Date();
  const diff = targetDate - now;

  if (diff <= 0) {
    lockScreen.style.display = "none";
    mainContent.classList.remove("hidden");
    startTyping();
    return;
  }

  const hours = Math.floor(diff / (1000 * 60 * 60));
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  countdown.innerHTML = `${hours}h ${minutes}m ${seconds}s`;
}

setInterval(updateCountdown, 1000);

// 💖 TYPING EFFECT
const message = `Today is your day — enjoy it to the fullest 💖

Always believe in yourself and follow your heart,
because the way you are is what makes you truly special ❤️

You are one of the most beautiful people in this world — truly.

Many, many congratulations on your special day ✨  
Happy Birthday to you ❤️`;
let i = 0;

function startTyping() {
  if (i < message.length) {
    let char = message.charAt(i);

    if (char === "\n") {
      document.getElementById("typedText").innerHTML += "<br>";
    } else {
      document.getElementById("typedText").innerHTML += char;
    }

    i++;
    setTimeout(startTyping, 35);
  }
}

// 🎵 MUSIC
function playMusic() {
  document.getElementById("music").play();
}
</script>

</body>
</html>
