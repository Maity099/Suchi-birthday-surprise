<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.container {
  width: 90%;
  max-width: 400px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 25px 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.hidden { display: none; }

h1 {
  font-size: 1.8em;
  margin-bottom: 10px;
}

p {
  font-size: 1em;
  line-height: 1.5;
}

#countdown {
  font-size: 1.5em;
  margin-top: 15px;
  font-weight: bold;
}

#typedText {
  margin-top: 15px;
  font-size: 1.1em;
  min-height: 60px;
}

img {
  width: 100%;
  max-width: 250px;
  border-radius: 15px;
  margin-top: 15px;
}

button {
  margin-top: 20px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 12px;
  background: white;
  color: #ff4d6d;
  font-size: 16px;
  font-weight: bold;
}

.fade {
  animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">

  <!-- LOCK SCREEN -->
  <div id="lockScreen">
    <h1>⏳ Wait for it...</h1>
    <p>This surprise unlocks soon 💖</p>
    <div id="countdown"></div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="mainContent" class="hidden">

    <h1 id="birthdayTitle" class="fade" style="display: none;">
      🎉 Happy Birthday ❤️
    </h1>

    <div id="typedText"></div>

    <img src="Suchi.png" class="fade">

    <button onclick="playMusic()">Play Song 🎵</button>

    <!-- 🎂 Auto Birthday Song -->
    <audio id="birthdayMusic" src="Candles_on_the_Veranda.mp3" loop preload="auto"></audio>

    <!-- 🎵 Your Song -->
    <audio id="music" src="The_Weight_of_Half_a_Room.mp3"></audio>

  </div>

</div>

<script>
// 🎯 SET DATE (IST SAFE)
const targetDate = new Date("2026-04-10T14:20:00+05:30");

const lockScreen = document.getElementById("lockScreen");
const mainContent = document.getElementById("mainContent");
const countdown = document.getElementById("countdown");

// COUNTDOWN
function updateCountdown() {
  const now = new Date();
  const diff = targetDate - now;

  if (diff <= 0) {
    lockScreen.style.display = "none";
    mainContent.classList.remove("hidden");

    startTyping();

    // 🎂 AUTO PLAY (browser-safe)
    const bday = document.getElementById("birthdayMusic");
    bday.muted = true;

    bday.play().then(() => {
      bday.muted = false;
    }).catch(() => {
      console.log("Autoplay blocked");
    });

    return;
  }

  const hours = Math.floor(diff / (1000 * 60 * 60));
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  countdown.innerHTML = `${hours}h ${minutes}m ${seconds}s`;
}

setInterval(updateCountdown, 1000);

// 💖 MESSAGE
const message = `Today is your day — enjoy it to the fullest 💖

Always believe in yourself and follow your heart,
because the way you are is what makes you truly special ❤️

You are one of the most beautiful people in this world — truly.

Many, many congratulations on your special day ✨  
Happy Birthday to you ❤️`;

let i = 0;

// 💖 TYPING EFFECT
function startTyping() {
  if (i < message.length) {
    let char = message.charAt(i);

    if (char === "\n") {
      document.getElementById("typedText").innerHTML += "<br>";
    } else {
      document.getElementById("typedText").innerHTML += char;
    }

    i++;
    setTimeout(startTyping, 150);
  } else {
    document.getElementById("birthdayTitle").style.display = "block";
  }
}

// 🎵 BUTTON MUSIC
function playMusic() {
  const bday = document.getElementById("birthdayMusic");
  const music = document.getElementById("music");

  bday.pause();
  music.play();
}

// 🔓 FALLBACK (if autoplay blocked)
document.body.addEventListener("click", () => {
  document.getElementById("birthdayMusic").play();
}, { once: true });

</script>

</body>
</html>
